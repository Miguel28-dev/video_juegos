<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>🎮 GameZone</h1>
    <input type="text" id="buscador" placeholder="Buscar juego...">
</header>

<section class="contenedor" id="listaJuegos">

    <div class="card">
        <h3>🔥 Call of Duty</h3>
        <p>Juego de disparos en primera persona.</p>
    </div>

    <div class="card">
        <h3>⚔️ God of War</h3>
        <p>Aventura épica con Kratos.</p>
    </div>

    <div class="card">
        <h3>🚗 GTA V</h3>
        <p>Mundo abierto lleno de acción.</p>
    </div>

    <div class="card">
        <h3>⚽ FIFA</h3>
        <p>El mejor simulador de fútbol.</p>
    </div>

</section>

<footer>
    <p>© 2026 GameZone</p>
</footer>

<script src="app.js"></script>
</body>
</html>
